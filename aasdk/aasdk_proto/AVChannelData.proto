syntax="proto3";

import "MediaCodecTypeEnum.proto";
import "AudioStreamTypeEnum.proto";
import "AudioConfigData.proto";
import "VideoConfigData.proto";

package f1x.aasdk.proto.data;

// Field 1 changed meaning from the old AVStreamType (AUDIO/VIDEO, just
// distinguishing the two) to the modern MediaCodecType (which codec this
// channel actually carries: raw PCM audio vs H.264 video, etc.) -- same
// field number, different semantics, matching the real Android Auto wire
// schema's MediaSinkService. Field 2 similarly moved from the old AudioType
// (MEDIA/SPEECH/SYSTEM/ALARM) to AudioStreamType (MEDIA/GUIDANCE/
// SYSTEM_AUDIO/TELEPHONY).
message AVChannel
{
    enums.MediaCodecType.Enum codec_type = 1;
    enums.AudioStreamType.Enum audio_type = 2;
    repeated AudioConfig audio_configs = 3;
    repeated VideoConfig video_configs = 4;
    bool available_while_in_call = 5;
    uint32 display_id = 6;
}
