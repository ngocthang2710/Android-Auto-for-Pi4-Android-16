syntax="proto3";

package f1x.aasdk.proto.data;

// Modern Android Auto (post-2020) consolidates the flat make/model/year/
// vehicle_id/head_unit_* strings from ServiceDiscoveryResponse into this
// nested message (field 17 there). The flat fields still exist on the wire
// but are marked deprecated by the real protocol; this message is the one
// current phones actually read.
message HeadUnitInfo
{
    string make = 1;
    string model = 2;
    string year = 3;
    string vehicle_id = 4;
    string head_unit_make = 5;
    string head_unit_model = 6;
    string head_unit_software_build = 7;
    string head_unit_software_version = 8;
}
