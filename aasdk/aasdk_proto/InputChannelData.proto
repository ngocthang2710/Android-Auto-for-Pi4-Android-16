syntax="proto3";

import "TouchConfigData.proto";

package f1x.aasdk.proto.data;

// The modern wire schema's InputSourceService advertises touchscreens/
// touchpads as *lists* (field 2/3), not a single nested config each --
// same field numbers as this library's original touch_screen_config/
// touch_pad_config, just repeated instead of singular.
message InputChannel
{
    repeated uint32 supported_keycodes = 1;
    repeated TouchConfig touchscreen = 2;
    repeated TouchConfig touchpad = 3;
    uint32 display_id = 5;
}
