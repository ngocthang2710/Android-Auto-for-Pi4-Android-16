syntax="proto3";

import "TouchLocationData.proto";
import "TouchActionEnum.proto";

package f1x.aasdk.proto.data;

message TouchEvent
{
    repeated data.TouchLocation touch_location = 1;
    uint32 action_index = 2;
    // `optional` forces this to always be present on the wire, even when
    // PRESS (its zero value) is set -- plain proto3 fields silently omit
    // zero values, so every DOWN/PRESS event (touch_action=0) was being
    // sent with NO touch_action field at all (confirmed via hex dump: a
    // PRESS indication and a RELEASE indication differed by this field's
    // presence, not its value). The phone apparently can't act on a touch
    // event with no discernible action, so no tap ever did anything.
    optional enums.TouchAction.Enum touch_action = 3;
}
